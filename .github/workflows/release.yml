name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy --strict src
      - run: python -m pytest --cov=ai_audit_log --cov-branch
      - run: python -m bandit -r src
      - run: python -m pip_audit

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install build twine
      - name: Validate tag against package version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as stream:
              package_version = tomllib.load(stream)["project"]["version"]
          tag_version = os.environ["REF_NAME"].removeprefix("v")
          if tag_version != package_version:
              raise SystemExit(
                  f"tag version {tag_version!r} does not match package version {package_version!r}"
              )
          print(f"release version verified: {package_version}")
          PY
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
